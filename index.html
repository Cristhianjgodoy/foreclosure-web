// ââ MARKDOWN RENDERER ââ
function renderInline(text) {
  if (!text) return null;
  const regex = /(\*\*\*[^*]+\*\*\*|\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;
  const tokens = []; let lastIdx = 0, match, key = 0;
  while ((match = regex.exec(text)) !== null) {
    if (match.index > lastIdx) tokens.push(React.createElement('span', {key:key++}, text.slice(lastIdx, match.index)));
    const raw = match[0];
    if      (raw.startsWith('***')) tokens.push(React.createElement('strong', {key:key++, className:"font-bold italic"}, raw.slice(3,-3)));
    else if (raw.startsWith('**'))  tokens.push(React.createElement('strong', {key:key++, className:"font-semibold text-gray-900"}, raw.slice(2,-2)));
    else if (raw.startsWith('*'))   tokens.push(React.createElement('em',     {key:key++, className:"italic text-gray-700"}, raw.slice(1,-1)));
    else if (raw.startsWith('`'))   tokens.push(React.createElement('code',   {key:key++, className:"font-mono bg-slate-100 text-blue-700 px-1.5 py-0.5 rounded text-xs border border-slate-200"}, raw.slice(1,-1)));
    lastIdx = regex.lastIndex;
  }
  if (lastIdx < text.length) tokens.push(React.createElement('span', {key:key++}, text.slice(lastIdx)));
  return tokens.length > 0 ? tokens : text;
}

const isTableSep = line => /^\|[\s\-:|]+\|$/.test(line.trim());

function MarkdownRenderer({ content }) {
  if (!content) return null;
  const lines = content.split('\n');
  const els = []; let i = 0, k = 0;

  while (i < lines.length) {
    const line = lines[i];

    if (line.startsWith('```')) {
      const lang = line.slice(3).trim();
      const code = []; i++;
      while (i < lines.length && !lines[i].startsWith('```')) { code.push(lines[i]); i++; }
      i++;
      if (lang !== 'json') {
        els.push(
          <div key={k++} className="my-3 rounded-xl overflow-hidden border border-slate-200 shadow-sm">
            {lang && <div className="bg-slate-800 text-slate-400 px-4 py-1.5 text-xs font-mono">{lang}</div>}
            <pre className="bg-slate-900 text-emerald-300 px-4 py-3 text-xs font-mono overflow-x-auto leading-relaxed whitespace-pre-wrap">{code.join('\n')}</pre>
          </div>
        );
      }
      continue;
    }

    if (line.includes('|') && i+1 < lines.length && isTableSep(lines[i+1])) {
      const tbl = [];
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') { tbl.push(lines[i]); i++; }
      if (tbl.length >= 2) {
        const parseRow = r => r.split('|').slice(1,-1).map(c => c.trim());
        const headers  = parseRow(tbl[0]);
        const rows     = tbl.slice(2).map(parseRow);
        const rc = cell => {
          if (/^(alto|high)/i.test(cell))              return 'bg-red-50 text-red-800 font-semibold';
          if (/^(m[eÃ©]dio|medium)/i.test(cell))        return 'bg-amber-50 text-amber-800 font-semibold';
          if (/^(baixo|low)/i.test(cell))               return 'bg-emerald-50 text-emerald-800 font-semibold';
          return '';
        };
        els.push(
          <div key={k++} className="my-3 overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
            <table className="w-full text-xs border-collapse min-w-max">
              <thead>
                <tr className="bg-slate-800 text-white">
                  {headers.map((h,j) => <th key={j} className="px-3 py-2.5 text-left font-semibold border-r border-slate-700 last:border-r-0 whitespace-nowrap">{renderInline(h)}</th>)}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,ri) => (
                  <tr key={ri} className={ri%2===0?"bg-white":"bg-slate-50"}>
                    {row.map((cell,ci) => <td key={ci} className={`px-3 py-2 border-r border-slate-100 last:border-r-0 border-t border-slate-100 ${rc(cell)}`}>{renderInline(cell)}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
        continue;
      }
    }

    if (/^[ââ=\-]{4,}$/.test(line.trim())) { els.push(<div key={k++} className="my-3 border-t border-slate-300"/>); i++; continue; }
    if (line.startsWith('#### ')) { els.push(<h4 key={k++} className="text-xs font-bold text-slate-600 uppercase tracking-wider mt-4 mb-1">{renderInline(line.slice(5))}</h4>); i++; continue; }
    if (line.startsWith('### '))  { els.push(<h3 key={k++} className="text-sm font-bold text-blue-800 mt-4 mb-1.5 pb-1 border-b border-blue-100">{renderInline(line.slice(4))}</h3>); i++; continue; }
    if (line.startsWith('## '))   { els.push(<h2 key={k++} className="text-base font-bold text-slate-800 mt-5 mb-2 pb-1.5 border-b-2 border-slate-200">{renderInline(line.slice(3))}</h2>); i++; continue; }
    if (line.startsWith('# '))    { els.push(<h1 key={k++} className="text-lg font-extrabold text-slate-900 mt-5 mb-2 pb-2 border-b-2 border-slate-300">{renderInline(line.slice(2))}</h1>); i++; continue; }
    if (line.startsWith('> '))    { els.push(<blockquote key={k++} className="my-2 pl-4 border-l-4 border-blue-400 bg-blue-50 py-2 pr-3 rounded-r-lg text-sm text-blue-900">{renderInline(line.slice(2))}</blockquote>); i++; continue; }

    if (line.match(/^[-*+] /) || line.match(/^\d+\. /)) {
      const ordered = !!line.match(/^\d+\. /);
      const items = [];
      while (i < lines.length && (lines[i].match(/^[-*+] /) || lines[i].match(/^\d+\. /))) {
        items.push(lines[i].replace(/^[-*+] /,'').replace(/^\d+\. /,'')); i++;
      }
      const Tag = ordered ? 'ol' : 'ul';
      els.push(<Tag key={k++} className={`my-1.5 pl-5 space-y-0.5 text-sm text-gray-800 ${ordered?'list-decimal':'list-disc'}`}>{items.map((it,j)=><li key={j} className="leading-relaxed">{renderInline(it)}</li>)}</Tag>);
      continue;
    }

    if (line.trim() === '') { els.push(<div key={k++} className="h-1.5"/>); i++; continue; }
    els.push(<p key={k++} className="text-sm text-gray-800 leading-relaxed">{renderInline(line)}</p>);
    i++;
  }
  return <div className="space-y-0.5">{els}</div>;
}

function App() {
  const [session,setSession]=useState(null);
  const [view,   setView]   =useState("tool");
  const login  = u => { setSession(u); setView(u.role==="admin"?"admin":"tool"); };
  const logout = async () => { if(session) await addLog({user:session.username,role:session.role,action:"Logout",time:ts()}); setSession(null); setView("tool"); };
  const update = u => setSession(u);
  if(!session) return <Login onLogin={login}/>;
  if(view==="admin") return <Admin user={session} onLogout={logout} onTool={()=>setView("tool")} onUpdate={update}/>;
  return <Tool user={session} onLogout={logout} onAdmin={()=>setView("admin")} onUpdate={update}/>;
}
